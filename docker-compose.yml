version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-radar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_radar
      POSTGRES_PASSWORD: ai_radar
      POSTGRES_DB: ai_radar
    ports:
      - "5433:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_radar -d ai_radar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-radar-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - ./.docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
