# values-prod.yaml — AI Radar production overrides
#
# Deploy with:
#   helm install kradar deploy/helm/ai-radar \
#     -f values-prod.yaml \
#     --set secrets.openaiApiKey=<LiteLLM-key> \
#     --set postgresql.auth.password=<pwd> \
#     --set postgresql.auth.postgresPassword=<pwd> \
#     --namespace kradar --create-namespace \
#     --wait --timeout 10m
#
# Resource naming: release name is "kradar", so resources become
#   kradar-web, kradar-scheduler, kradar-postgresql, kradar-redis-master, ...
# Chart itself stays named "ai-radar" (matches GitHub repo).
#
# (openaiApiKey is intentionally NOT in this file — pass via --set so the
#  key never lands in git or shell history beyond the single command.)
#
# -----------------------------------------------------------------------------
# Two image sources:
#
#   1. App image (ai-radar):   ALWAYS pulled from ghcr.io (public, our own).
#      → no mirroring needed; cluster must be able to reach ghcr.io.
#
#   2. Dependency images (postgres, redis, busybox):  pulled from a private
#      registry because Docker Hub is unreachable from this cluster.
#      → change `_depRegistry` below to repoint all three at a different
#        registry; mirror commands are documented inline.
# -----------------------------------------------------------------------------

# Anchor — change THIS LINE to repoint all dependency images at a different
# registry. The app image (ghcr.io/weekend-ai/ai-radar) is unaffected.
_depRegistry: &depRegistry vropco.azurecr.io

# Mirror commands (run from a host with both Docker Hub + your registry reach):
#
#   REG=vropco.azurecr.io
#   az acr login --name vropco
#   crane copy docker.io/pgvector/pgvector:pg16          $REG/pgvector/pgvector:pg16
#   crane copy docker.io/bitnami/redis:latest            $REG/bitnami/redis:8.0-latest-snapshot
#   crane copy docker.io/library/busybox:1.37            $REG/library/busybox:1.37

# -----------------------------------------------------------------------------
# App image — pulled from GHCR (public)
# -----------------------------------------------------------------------------
image:
  repository: ghcr.io/weekend-ai/ai-radar
  tag: "v0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# busybox init container (wait-for-postgres in migrate hook). Mirrored.
migrate:
  waitImage: vropco.azurecr.io/library/busybox:1.37

# -----------------------------------------------------------------------------
# LLM gateway — route through private LiteLLM instead of api.openai.com
# -----------------------------------------------------------------------------
secrets:
  create: true
  # openaiApiKey: ""  ← pass via --set on install
  openaiBaseUrl: "https://litellm.revitalise.cc"
  openaiEnrichModel: "gpt-4o-mini"
  openaiEmbedModel: "text-embedding-3-large"
  openaiEmbedDimensions: "1536"

# -----------------------------------------------------------------------------
# Web — production-ish defaults
# -----------------------------------------------------------------------------
web:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false

# Scheduler MUST stay at 1 (repeatable-job registration is global)
scheduler:
  enabled: true
  replicaCount: 1

# -----------------------------------------------------------------------------
# Ingress — disabled until Cloudflare Tunnel lands
# -----------------------------------------------------------------------------
ingress:
  enabled: false

# -----------------------------------------------------------------------------
# Postgres (pgvector) — image mirrored to _depRegistry
# CHANGE PASSWORDS via --set on install
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    username: ai_radar
    database: ai_radar
    password: "CHANGE-ME-app-user-pwd"
    postgresPassword: "CHANGE-ME-superuser-pwd"
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: "default"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  image:
    registry: *depRegistry
    repository: pgvector/pgvector
    tag: "pg16"
  # pgvector/pgvector image is NOT the Bitnami PG image — it's the upstream
  # community pgvector image which doesn't mount /var/run/postgresql as
  # emptyDir. Bitnami chart defaults containerSecurityContext.readOnlyRootFs=true
  # which makes the upstream image crash with:
  #   FATAL: could not create lock file "/var/run/postgresql/.s.PGSQL.5432.lock":
  #     Read-only file system
  # Disable the readOnly root for both primary + read replicas.
  primary:
    containerSecurityContext:
      readOnlyRootFilesystem: false
  readReplicas:
    containerSecurityContext:
      readOnlyRootFilesystem: false

# -----------------------------------------------------------------------------
# Global Bitnami subchart overrides (MUST be top-level)
# -----------------------------------------------------------------------------
global:
  security:
    # Allow non-Bitnami images (pgvector/pgvector + our snapshot of bitnami/redis)
    allowInsecureImages: true
  # Default registry for Bitnami subchart images
  imageRegistry: *depRegistry

# -----------------------------------------------------------------------------
# Redis — image mirrored to _depRegistry
#
# Bitnami removed all named tags from Docker Hub free tier in 2025 (Broadcom
# policy); only `latest` and sha256 digests remain. We mirror `latest` →
# private registry under a date-or-version-pinned tag.
# -----------------------------------------------------------------------------
redis:
  enabled: true
  architecture: standalone
  image:
    registry: *depRegistry
    repository: bitnami/redis
    tag: "8.0-latest-snapshot"
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "default"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
