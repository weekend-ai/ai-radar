# values-prod.yaml — AI Radar production overrides
#
# Deploy with:
#   helm install ai-radar deploy/helm/ai-radar \
#     -f values-prod.yaml \
#     --set secrets.openaiApiKey=<LiteLLM-key> \
#     --namespace ai-radar --create-namespace \
#     --wait --timeout 10m
#
# (openaiApiKey is intentionally NOT in this file — pass via --set so the
#  key never lands in git or shell history beyond the single command.)

# -----------------------------------------------------------------------------
# Image — pinned to the freshly built+pushed image
# -----------------------------------------------------------------------------
image:
  repository: vropco.azurecr.io/weekend-ai/ai-radar
  tag: "v0.1.0"          # bump after each docker push
  pullPolicy: IfNotPresent

# Package is public on GHCR, but our cluster cannot reach Docker Hub /
# ghcr.io directly — all images are mirrored to vropco.azurecr.io via crane.
imagePullSecrets: []

# -----------------------------------------------------------------------------
# LLM gateway — route through your private LiteLLM instance instead of
# api.openai.com. The OpenAI SDK speaks the same protocol so this just works.
# -----------------------------------------------------------------------------
secrets:
  create: true
  # openaiApiKey: ""  ← pass via --set on install command, not in the file
  openaiBaseUrl: "https://litellm.revitalise.cc"
  openaiEnrichModel: "gpt-4o-mini"          # adjust if LiteLLM exposes different names
  openaiEmbedModel: "text-embedding-3-large"
  openaiEmbedDimensions: "1536"

# -----------------------------------------------------------------------------
# Web — bump to production-ish defaults
# -----------------------------------------------------------------------------
web:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false   # turn on after stable

# Scheduler MUST stay at 1 (repeatable-job registration is global)
scheduler:
  enabled: true
  replicaCount: 1

# -----------------------------------------------------------------------------
# Ingress — disabled for first install. Enable when we add Cloudflare Tunnel
# or proper ingress controller.
# -----------------------------------------------------------------------------
ingress:
  enabled: false

# -----------------------------------------------------------------------------
# Postgres (pgvector) — the actual DB backing the pipeline
# CHANGE THESE PASSWORDS before installing in any environment you care about.
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    username: ai_radar
    database: ai_radar
    # ⚠️ override these via --set on install, or rotate after first install
    password: "CHANGE-ME-app-user-pwd"
    postgresPassword: "CHANGE-ME-superuser-pwd"
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: "default"   # Azure disk.csi.azure.com (WaitForFirstConsumer)
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  # pgvector image — mirrored to internal ACR (cluster can't reach Docker Hub)
  image:
    registry: vropco.azurecr.io
    repository: pgvector/pgvector
    tag: "pg16"

# -----------------------------------------------------------------------------
# Global Bitnami subchart overrides (MUST be at top level, not under postgresql)
# -----------------------------------------------------------------------------
global:
  security:
    # Allow non-Bitnami images (pgvector/pgvector + our ACR mirror of bitnami/redis)
    allowInsecureImages: true
  # Default registry for all Bitnami subchart images. Per-chart image.registry
  # overrides this (we set it explicitly for postgres + redis above/below).
  imageRegistry: vropco.azurecr.io

# -----------------------------------------------------------------------------
# Redis — BullMQ queue backing store
# -----------------------------------------------------------------------------
redis:
  enabled: true
  architecture: standalone
  # Mirrored to internal ACR (same reason as postgres).
  # Bitnami removed all named tags in 2025 (Broadcom policy); only `latest`
  # remains on Docker Hub free tier. We mirror `latest` → ACR under a
  # date-pinned tag so the ACR side never drifts mid-deploy.
  #
  # When refreshing: `crane copy docker.io/bitnami/redis:latest
  #   vropco.azurecr.io/bitnami/redis:YYYY-MM-DD` and bump the tag below.
  image:
    registry: vropco.azurecr.io
    repository: bitnami/redis
    tag: "8.0-latest-snapshot"
  auth:
    enabled: false    # cluster-internal only; turn on if cluster shared with others
  master:
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "default"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
