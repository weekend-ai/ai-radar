{{- if .Values.scheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-radar.fullname" . }}-scheduler
  labels:
    {{- include "ai-radar.scheduler.labels" . | nindent 4 }}
spec:
  # MUST stay at 1. BullMQ repeatable jobs are registered globally and a
  # second scheduler would double-register every cron entry.
  replicas: {{ .Values.scheduler.replicaCount }}
  strategy:
    # Recreate (not RollingUpdate) — avoids two schedulers running at once
    # during a rollout, which would re-register repeat jobs.
    type: Recreate
  selector:
    matchLabels:
      {{- include "ai-radar.scheduler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-radar.scheduler.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "ai-radar.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: scheduler
          image: {{ include "ai-radar.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.scheduler.command }}
          args: {{ toJson .Values.scheduler.args }}
          env:
            {{- include "ai-radar.commonEnv" . | nindent 12 }}
            {{- with .Values.scheduler.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.scheduler.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.scheduler.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduler.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduler.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
