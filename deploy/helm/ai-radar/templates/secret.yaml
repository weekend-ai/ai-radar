{{- if and .Values.secrets.create (not .Values.secrets.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-radar.secretName" . }}
  labels:
    {{- include "ai-radar.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "ai-radar.databaseUrl" . | quote }}
  REDIS_URL: {{ include "ai-radar.redisUrl" . | quote }}
  OPENAI_API_KEY: {{ required "secrets.openaiApiKey is required" .Values.secrets.openaiApiKey | quote }}
  OPENAI_BASE_URL: {{ .Values.secrets.openaiBaseUrl | quote }}
  OPENAI_ENRICH_MODEL: {{ .Values.secrets.openaiEnrichModel | quote }}
  OPENAI_EMBED_MODEL: {{ .Values.secrets.openaiEmbedModel | quote }}
  OPENAI_EMBED_DIMENSIONS: {{ .Values.secrets.openaiEmbedDimensions | quote }}
{{- end }}
