{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  # Suffix with revision so each upgrade gets a fresh job name. Helm hook
  # deletion policy cleans up old ones.
  name: {{ include "ai-radar.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "ai-radar.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": {{ .Values.migrate.helmHookDeletePolicy | quote }}
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrate.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "ai-radar.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "ai-radar.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Wait for postgres to be reachable before drizzle runs. We can't use the
      # bitnami subchart's own healthcheck here (cross-release coupling), so do
      # a TCP poll with nc. 60s ceiling — pg is usually ready in <10s.
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.migrate.waitImage | default "busybox:1.37" }}
          command:
            - sh
            - -c
            - |
              set -e
              host=$(echo "$DATABASE_URL" | sed -E 's|.*@([^:/]+).*|\1|')
              echo "Waiting for postgres at $host:5432..."
              for i in $(seq 1 60); do
                if nc -z "$host" 5432; then echo "postgres up"; exit 0; fi
                sleep 1
              done
              echo "timeout waiting for postgres" >&2
              exit 1
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-radar.secretName" . }}
                  key: DATABASE_URL
      containers:
        - name: migrate
          image: {{ include "ai-radar.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.migrate.command }}
          args: {{ toJson .Values.migrate.args }}
          env:
            {{- include "ai-radar.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
{{- end }}
